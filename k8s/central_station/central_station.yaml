apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-station
spec:
  selector:
    matchLabels:
      app: central-station
  template:
    metadata:
      labels:
        app: central-station
    spec:
      containers:
        - name: central-station
          image: central_station:latest
          imagePullPolicy: Never
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
---
apiVersion: v1
kind: Service
metadata:
  name: central-station-svc
spec:
  selector:
    app: central-station
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080